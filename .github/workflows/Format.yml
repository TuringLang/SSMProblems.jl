name: Format

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Check formatting
        run: |
          using Pkg
          Pkg.add(Pkg.PackageSpec(name="JuliaFormatter", version="1"))

          using JuliaFormatter
          format("GeneralisedFilters"; verbose=true)
          format("SSMProblems"; verbose=true)

          if !success(`git diff --quiet`)
              run(`git diff --color=always`)
              error("Code is not formatted. Run JuliaFormatter locally and commit the changes.")
          end
        shell: julia --color=yes {0}
